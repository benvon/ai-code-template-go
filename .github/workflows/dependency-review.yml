name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency Review Availability Notice
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review could not run (dependency graph/review may be disabled for this repository). Failing open."
