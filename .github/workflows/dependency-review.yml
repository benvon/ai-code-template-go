name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Dependency Review Availability
        id: availability
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status_code="$(curl -sS -o /tmp/sbom_response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")"

          if [ "${status_code}" = "200" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "available=false" >> "${GITHUB_OUTPUT}"
          echo "status_code=${status_code}" >> "${GITHUB_OUTPUT}"

      - name: Dependency Review
        if: steps.availability.outputs.available == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency Review Availability Notice
        if: steps.availability.outputs.available != 'true'
        run: |
          echo "::warning::Dependency Review not available for this repository (HTTP ${{ steps.availability.outputs.status_code }}). Failing open."
