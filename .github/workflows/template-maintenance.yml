name: Template Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    name: Weekly Maintenance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Refresh maintenance pins
        run: ./scripts/maintenance/update_versions.sh --discover-latest

      - name: Validate maintenance changes
        run: |
          ./scripts/maintenance/validate.sh
          ./scripts/maintenance/validate_test.sh
          ./scripts/maintenance/idempotency_test.sh

      - name: Generate risk summary
        run: |
          {
            echo "This PR was generated automatically by the template maintenance workflow."
            echo
            echo "## Checklist"
            echo "- [ ] Review tool and dependency pin updates"
            echo "- [ ] Review workflow/action updates"
            echo "- [ ] Confirm CI remains green"
            echo "- [ ] Confirm release workflow still succeeds"
            echo
            echo "## Risk Summary"
            echo
            echo "### Tooling changes"
            git diff -- .tool-versions maintenance/versions.yaml .pre-commit-config.yaml || true
            echo
            echo "### Workflow changes"
            git diff -- .github/workflows || true
            echo
            echo "### Potential breakages"
            echo "- Verify CI passes with updated versions."
            echo "- Verify local setup scripts still install pinned tools."
            echo "- Verify release workflow continues to build tagged releases."
          } > maintenance-risk-summary.md

      - name: Create maintenance pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/template-maintenance
          commit-message: "chore: refresh template maintenance pins"
          title: "chore: weekly template maintenance"
          body-path: maintenance-risk-summary.md
          labels: |
            chore
            maintenance
